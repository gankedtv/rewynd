name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # lets the tag-triggered release workflow gate on these exact checks

# Read-only: none of these jobs write to the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (tags are mutable).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/linux-build-deps

      # Fails fast before the heavy GPU-stack compile.
      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # The probe diagnostics + their examples are feature-gated and would otherwise bitrot.
      - name: clippy (capture probes)
        run: cargo clippy -p rewynd-capture --all-targets --features probes --locked -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets --locked

      - name: test
        run: cargo test --workspace --locked

      # The vendored muxer fork (ADR 0004) is workspace-excluded, so its inherited test
      # suite (elst/dOps round-trips our A/V sync depends on) needs an explicit run. Lib
      # tests only: an upstream doctest expects a sample file that isn't vendored.
      - name: test vendored mp4 fork
        run: cargo test --manifest-path vendor/mp4/Cargo.toml --locked --lib

  windows:
    name: windows · clippy · build · test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # No apt deps here: pipewire/ashpd are cfg(linux)-gated; the Windows capture path
      # (windows-capture, windows-rs) and vk-mem build against the preinstalled MSVC
      # toolchain. rustfmt runs on the Linux job (formatting is platform-independent).
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets --locked

      - name: test
        run: cargo test --workspace --locked

  deny:
    name: advisories · licenses · sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Gates RUSTSEC advisories, the GPL-compatible license allowlist (PLAN §3.7), and
      # the single-wgpu-source invariant (ADR 0001). Config in deny.toml.
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable

  coverage:
    name: coverage gate (CI-testable surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/linux-build-deps
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov

      # Gates 85% line coverage on CI-testable code only. GPU/portal code needs a
      # GPU/live Wayland session CI does not have, so it is excluded here and covered
      # by #[ignore]d tests on the dev box (see CLAUDE.md → Coverage).
      - name: coverage gate
        run: |
          cargo llvm-cov --workspace --locked \
            --ignore-filename-regex '(capture/src/linux/|gpu/src/|encode/src/(gpu_video_backend|software_texture)\.rs|app/src/|settings/src/|vendor/mp4/)' \
            --fail-under-lines 85 --summary-only
