name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Linux capture deps: pipewire-sys/libspa-sys need libpipewire-0.3 (pkg-config)
      # and libclang (bindgen). vk-mem needs a C++ compiler (preinstalled). The Opus audio
      # encoder (audiopus_sys) links system libopus → libopus-dev. The iced settings GUI's
      # winit/softbuffer backend needs libxkbcommon (keymap) to build (ADR 0006).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libpipewire-0.3-dev clang libclang-dev libopus-dev libxkbcommon-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Fails fast before the heavy GPU-stack compile.
      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets --locked

      - name: test
        run: cargo test --workspace --locked

  coverage:
    name: coverage gate (CI-testable surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libpipewire-0.3-dev clang libclang-dev libopus-dev libxkbcommon-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Gates 85% line coverage on CI-testable code only. GPU/portal code needs a
      # GPU/live Wayland session CI does not have, so it is excluded here and covered
      # by #[ignore]d tests on the dev box (see CLAUDE.md → Coverage).
      - name: coverage gate
        run: |
          cargo llvm-cov --workspace --locked \
            --ignore-filename-regex '(capture/src/linux/|gpu/src/|encode/src/gpu_video_backend\.rs|app/src/|settings/src/|vendor/mp4/)' \
            --fail-under-lines 85 --summary-only
