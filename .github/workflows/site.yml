name: Site

# Build + type-check the marketing site. Scoped to site/ so Rust-only changes
# don't pay for a Node build, and vice versa.
on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/site.yml']
  pull_request:
    paths: ['site/**', '.github/workflows/site.yml']

permissions:
  contents: read

jobs:
  build:
    name: build · check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      # Third-party actions are pinned to commit SHAs (tags are mutable).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: install
        run: npm ci

      - name: check
        run: npm run check

      - name: build
        run: npm run build
