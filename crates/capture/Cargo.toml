[package]
name = "rewynd-capture"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false

[dependencies]
wgpu.workspace = true
thiserror.workspace = true
tracing.workspace = true

# Linux capture (PLAN §3.5): XDG ScreenCast portal + PipeWire. Linux-only.
[target.'cfg(target_os = "linux")'.dependencies]
ashpd.workspace = true
pipewire.workspace = true
# Used to query the GPU's supported DRM format modifiers for the PipeWire DMA-BUF
# negotiation (#4) via VK_EXT_image_drm_format_modifier. Matches the 0.38.x already
# pulled into Cargo.lock by wgpu-hal/gpu-video.
ash = "0.38"

[target.'cfg(target_os = "linux")'.dev-dependencies]
tokio.workspace = true
tracing-subscriber.workspace = true

# Diagnostic probe (#4): logs PipeWire node id, negotiated format, and per-frame
# DMA-BUF descriptors. Linux-only at runtime; the binary compiles everywhere via a
# `#[cfg(not(target_os = "linux"))]` stub `main`.
[[example]]
name = "linux_capture_probe"
