[package]
name = "rewynd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false
description = "Lightweight instant-replay clip recorder: keeps the last 60s on the GPU, writes a clip on a hotkey."

[dependencies]
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
rewynd-buffer.workspace = true
rewynd-encode.workspace = true

# Linux MVP wiring: capture + GPU import + the ScreenCast (capture) and
# GlobalShortcuts (hotkey) portals. Linux-only; the binary compiles elsewhere via a
# `#[cfg(not(target_os = "linux"))]` stub `main`.
[target.'cfg(target_os = "linux")'.dependencies]
rewynd-capture.workspace = true
rewynd-gpu.workspace = true
rewynd-mux.workspace = true
ashpd = { workspace = true, features = ["global_shortcuts"] }
tokio.workspace = true
pollster.workspace = true
futures-util = "0.3"
