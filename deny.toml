# cargo-deny gate (PLAN §3.7: GPL-compatibility re-verified on every dependency change;
# ADR 0001: exactly one wgpu source).

[graph]
# Only the platforms we ship; keeps advisories in macOS/BSD-only corners of the
# tree from failing a build that never compiles them.
targets = ["x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

[advisories]
version = 2
yanked = "deny"
# Advisories consciously accepted, each with the reason and its removal condition:
ignore = [
    "RUSTSEC-2026-0150", # audiopus_sys unmaintained — we link SYSTEM libopus via pkg-config, the bundled-CMake path never runs
    "RUSTSEC-2026-0192", # ttf-parser unmaintained — transitive via iced/winit; upstream migration (skrifa) is theirs
    "RUSTSEC-2024-0388", # derivative unmaintained — inside the ADR-0001-pinned gpu-video rev
    # quick-xml quadratic-runtime DoS on attacker-supplied start tags (0194) and unbounded
    # namespace-declaration allocation in NsReader (0195); both patched only in >= 0.41 while
    # both our copies are semver-pinned upstream. Not reachable here: 0.39 sits in
    # wayland-scanner, a proc-macro parsing the BUNDLED protocol XML at compile time, and 0.37
    # sits in notify-rust's Windows-only backend serializing our own toast XML. Drop when
    # winit/wayland-rs and notify-rust move to a patched quick-xml.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # tray-icon's Linux backend (gtk-rs GTK3 bindings + proc-macro-error, all
    # unmaintained): dead code here — our Linux tray is ksni over D-Bus, tray-icon is
    # only ever compiled on Windows, where none of these are in the build. cargo-deny
    # still walks the edges because its target filter is per-cfg, not per-platform
    # reachability. Drop when tray-icon moves off GTK3 (its tracking issue: GTK4/xdg
    # portal backend) or grows a feature to opt out of the GTK backend.
    "RUSTSEC-2024-0370", # proc-macro-error (via gtk3-macros)
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk-sys
    "RUSTSEC-2024-0420", # gtk3-macros
]

[licenses]
version = 2
# GPL-3.0-or-later (our own crates) plus GPLv3-compatible permissive licenses only.
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"
[[bans.deny]]
# ADR 0001: wgpu must come from the single pinned git source, never crates.io. Cargo.lock also
# carries a DORMANT crates.io wgpu 27 entry via iced_renderer's weak `iced_wgpu?` feature (see
# the ADR 0001 note): it never resolves into a build graph today, and this ban is the tripwire
# that fails CI if some future feature change activates it.
crate = "wgpu"
wrappers = []
deny-multiple-versions = true

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = [
    "https://github.com/gfx-rs/wgpu",
    "https://github.com/software-mansion/smelter",
]
